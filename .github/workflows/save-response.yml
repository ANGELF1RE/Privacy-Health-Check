name: Save Survey Response

on:
  repository_dispatch:
    types: [survey-response]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ github.event.client_payload.title }}
          ISSUE_BODY: ${{ github.event.client_payload.body }}
          LEVEL: ${{ github.event.client_payload.level }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const level = process.env.LEVEL || 'unknown';
            const label = level.toLowerCase().replace(/\s+/g, '-');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: process.env.ISSUE_TITLE,
              body: process.env.ISSUE_BODY,
              labels: ['response', label]
            });
