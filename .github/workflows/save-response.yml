name: Save Survey Response

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Respondent name'
        required: true
      role:
        description: 'Role'
        required: true
      company:
        description: 'Company'
        required: true
      email:
        description: 'Email'
        required: true
      score:
        description: 'Score'
        required: true
      level:
        description: 'Level'
        required: true
      body:
        description: 'Full issue body (markdown)'
        required: true

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        env:
          BODY: ${{ github.event.inputs.body }}
          COMPANY: ${{ github.event.inputs.company }}
          NAME: ${{ github.event.inputs.name }}
          SCORE: ${{ github.event.inputs.score }}
          LEVEL: ${{ github.event.inputs.level }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Response] ${process.env.COMPANY} · ${process.env.NAME} · Score: ${process.env.SCORE} · ${process.env.LEVEL}`,
              body: process.env.BODY,
              labels: ['response']
            });
